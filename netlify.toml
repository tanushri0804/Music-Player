[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect all routes to index.html for React Router (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Proxy iTunes API calls to avoid CORS in production
[[redirects]]
  from = "/api/itunes/*"
  to = "https://itunes.apple.com/:splat"
  status = 200
  force = true
