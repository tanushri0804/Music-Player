[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Rewrite /api/itunes/* → Netlify Function (works in production)
[[redirects]]
  from = "/api/itunes/*"
  to = "/.netlify/functions/itunes"
  status = 200
  force = true

# React Router — send all unmatched routes to index.html (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
